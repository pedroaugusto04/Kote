services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KB_POSTGRES_DB:-knowledge_base}
      POSTGRES_USER: ${KB_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${KB_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${KB_POSTGRES_PORT:-5438}:5432"
    volumes:
      - kb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    init: true
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      NODE_ENV: development
      KB_API_HOST: 0.0.0.0
      KB_DATABASE_URL: ${KB_DATABASE_URL_DOCKER:-postgres://postgres:postgres@postgres:5432/knowledge_base}
      KB_API_INSPECT: ${KB_API_INSPECT:-true}
      KB_API_INSPECT_PORT: ${KB_API_INSPECT_PORT:-9229}
      KB_LOG_FILE_ENABLED: ${KB_LOG_FILE_ENABLED:-true}
      KB_LOG_DIR: ${KB_LOG_DIR:-/app/logs}
      KB_LOG_MAX_FILES: ${KB_LOG_MAX_FILES:-30}
      KB_LOG_MAX_SIZE: ${KB_LOG_MAX_SIZE:-20m}
      KB_LOG_LEVEL: ${KB_LOG_LEVEL:-debug}
      # Email configuration (defaults for local development)
      KB_EMAIL_PROVIDER: ${KB_EMAIL_PROVIDER:-resend}
      KB_EMAIL_RESEND_API_KEY: ${KB_EMAIL_RESEND_API_KEY:-}
      KB_EMAIL_FROM: ${KB_EMAIL_FROM:-Knowledge Base <no-reply@example.com>}
      KB_EMAIL_SMTP_HOST: ${KB_EMAIL_SMTP_HOST:-}
      KB_EMAIL_SMTP_PORT: ${KB_EMAIL_SMTP_PORT:-587}
      KB_EMAIL_SMTP_USER: ${KB_EMAIL_SMTP_USER:-}
      KB_EMAIL_SMTP_PASS: ${KB_EMAIL_SMTP_PASS:-}
      KB_EMAIL_SMTP_SECURE: ${KB_EMAIL_SMTP_SECURE:-false}
      KB_EMAIL_QUEUE_EXCHANGE: ${KB_EMAIL_QUEUE_EXCHANGE:-kb.email}
      KB_EMAIL_QUEUE_NAME: ${KB_EMAIL_QUEUE_NAME:-kb.email.send}
      KB_EMAIL_QUEUE_ROUTING_KEY: ${KB_EMAIL_QUEUE_ROUTING_KEY:-kb.email.send}
      KB_EMAIL_WORKER_AUTORUN: ${KB_EMAIL_WORKER_AUTORUN:-false}
      DEV_EMAIL_INTERCEPT: ${DEV_EMAIL_INTERCEPT:-false}
      DEV_EMAIL: ${DEV_EMAIL:-pedroaugustoaduarte@gmail.com}
    command: sh -c "umask 000 && npm install && npm run dev:api"
    ports:
      - "${KB_API_PORT:-4310}:${KB_API_PORT:-4310}"
      - "${KB_API_INSPECT_PORT:-9229}:${KB_API_INSPECT_PORT:-9229}"
    volumes:
      - ./:/app
      - kb_api_node_modules:/app/node_modules
      - kb_api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- "http://127.0.0.1:${KB_API_PORT:-4310}/api/health" >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      KB_FRONTEND_HOST: 0.0.0.0
      KB_API_PROXY_TARGET: http://api:${KB_API_PORT:-4310}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    command: sh -c "umask 000 && npm install && npm run dev:frontend -- --host 0.0.0.0"
    ports:
      - "${KB_FRONTEND_PORT:-4311}:${KB_FRONTEND_PORT:-4311}"
    volumes:
      - ./:/app
      - kb_frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    ports:
      - "${KB_RABBITMQ_PORT:-5673}:5672"
      - "${KB_RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${KB_RABBITMQ_USER:-kb}
      RABBITMQ_DEFAULT_PASS: ${KB_RABBITMQ_PASSWORD:-kb_dev}
    volumes:
      - kb_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  kb_postgres_data:
  kb_api_node_modules:
  kb_frontend_node_modules:
  kb_rabbitmq_data:
  kb_api_logs:
