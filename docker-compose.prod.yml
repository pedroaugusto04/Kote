services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      KB_API_HOST: 0.0.0.0
      KB_DATABASE_URL: ${KB_DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      KB_SUPABASE_STORAGE_BUCKET: ${KB_SUPABASE_STORAGE_BUCKET}
      KB_SUPABASE_CACHE_CONTROL: ${KB_SUPABASE_CACHE_CONTROL:-31536000}
      LOG_PRETTY_CONSOLE: ${LOG_PRETTY_CONSOLE:-true}
      KB_LOG_PRETTY_CONSOLE: ${KB_LOG_PRETTY_CONSOLE:-true}
      KB_LOG_FILE_ENABLED: ${KB_LOG_FILE_ENABLED:-true}
      KB_LOG_DIR: ${KB_LOG_DIR:-/var/log/knowledge-base-api}
      KB_LOG_MAX_FILES: ${KB_LOG_MAX_FILES:-30}
      KB_LOG_MAX_SIZE: ${KB_LOG_MAX_SIZE:-20m}
      KB_LOG_LEVEL: ${KB_LOG_LEVEL:-info}
      # Browser extension IDs (comma-separated, for chrome-extension:// origins)
      KB_ALLOWED_EXTENSION_IDS: ${KB_ALLOWED_EXTENSION_IDS:-}
      # Email configuration
      KB_EMAIL_PROVIDER: ${KB_EMAIL_PROVIDER:-resend}
      KB_EMAIL_RESEND_API_KEY: ${KB_EMAIL_RESEND_API_KEY:-}
      KB_EMAIL_FROM: ${KB_EMAIL_FROM:-Kote <onboarding@resend.dev>}
      KB_EMAIL_SMTP_HOST: ${KB_EMAIL_SMTP_HOST:-}
      KB_EMAIL_SMTP_PORT: ${KB_EMAIL_SMTP_PORT:-587}
      KB_EMAIL_SMTP_USER: ${KB_EMAIL_SMTP_USER:-}
      KB_EMAIL_SMTP_PASS: ${KB_EMAIL_SMTP_PASS:-}
      KB_EMAIL_SMTP_SECURE: ${KB_EMAIL_SMTP_SECURE:-false}
      KB_EMAIL_QUEUE_EXCHANGE: ${KB_EMAIL_QUEUE_EXCHANGE:-kb.email}
      KB_EMAIL_QUEUE_NAME: ${KB_EMAIL_QUEUE_NAME:-kb.email.send}
      KB_EMAIL_QUEUE_ROUTING_KEY: ${KB_EMAIL_QUEUE_ROUTING_KEY:-kb.email.send}
      KB_EMAIL_WORKER_AUTORUN: ${KB_EMAIL_WORKER_AUTORUN:-true}
      DEV_EMAIL_INTERCEPT: ${DEV_EMAIL_INTERCEPT:-false}
      DEV_EMAIL: ${DEV_EMAIL:-pedroaugustoaduarte@gmail.com}
      # Test email authentication secret
      KB_TEST_EMAIL_AUTH_SECRET: ${KB_TEST_EMAIL_AUTH_SECRET:-}
      # Email branding (production defaults)
      APP_NAME: ${APP_NAME:-Kote}
      APP_LOGO_URL: ${APP_LOGO_URL:-}

      # AI Configuration — category defaults
      KB_DEFAULT_CHAT_AI_PROVIDER: ${KB_DEFAULT_CHAT_AI_PROVIDER:-}
      KB_DEFAULT_CHAT_AI_BASE_URL: ${KB_DEFAULT_CHAT_AI_BASE_URL:-}
      KB_DEFAULT_CHAT_AI_MODEL: ${KB_DEFAULT_CHAT_AI_MODEL:-}
      KB_DEFAULT_CHAT_AI_API_KEY: ${KB_DEFAULT_CHAT_AI_API_KEY:-}
      KB_DEFAULT_EMBEDDING_AI_PROVIDER: ${KB_DEFAULT_EMBEDDING_AI_PROVIDER:-}
      KB_DEFAULT_EMBEDDING_AI_BASE_URL: ${KB_DEFAULT_EMBEDDING_AI_BASE_URL:-}
      KB_DEFAULT_EMBEDDING_AI_MODEL: ${KB_DEFAULT_EMBEDDING_AI_MODEL:-}
      KB_DEFAULT_EMBEDDING_AI_API_KEY: ${KB_DEFAULT_EMBEDDING_AI_API_KEY:-}
      KB_DEFAULT_AUDIO_AI_PROVIDER: ${KB_DEFAULT_AUDIO_AI_PROVIDER:-}
      KB_DEFAULT_AUDIO_AI_BASE_URL: ${KB_DEFAULT_AUDIO_AI_BASE_URL:-}
      KB_DEFAULT_AUDIO_AI_MODEL: ${KB_DEFAULT_AUDIO_AI_MODEL:-}
      KB_DEFAULT_AUDIO_AI_API_KEY: ${KB_DEFAULT_AUDIO_AI_API_KEY:-}
      # AI Configuration — per-provider overrides (optional)
      KB_REVIEW_AI_PROVIDER: ${KB_REVIEW_AI_PROVIDER:-}
      KB_REVIEW_AI_BASE_URL: ${KB_REVIEW_AI_BASE_URL:-}
      KB_REVIEW_AI_MODEL: ${KB_REVIEW_AI_MODEL:-}
      KB_REVIEW_AI_API_KEY: ${KB_REVIEW_AI_API_KEY:-}
      KB_CONVERSATION_AI_PROVIDER: ${KB_CONVERSATION_AI_PROVIDER:-}
      KB_CONVERSATION_AI_BASE_URL: ${KB_CONVERSATION_AI_BASE_URL:-}
      KB_CONVERSATION_AI_MODEL: ${KB_CONVERSATION_AI_MODEL:-}
      KB_CONVERSATION_AI_API_KEY: ${KB_CONVERSATION_AI_API_KEY:-}
      KB_PROJECT_BRIEF_AI_PROVIDER: ${KB_PROJECT_BRIEF_AI_PROVIDER:-}
      KB_PROJECT_BRIEF_AI_BASE_URL: ${KB_PROJECT_BRIEF_AI_BASE_URL:-}
      KB_PROJECT_BRIEF_AI_MODEL: ${KB_PROJECT_BRIEF_AI_MODEL:-}
      KB_PROJECT_BRIEF_AI_API_KEY: ${KB_PROJECT_BRIEF_AI_API_KEY:-}
      KB_FILE_NOTES_SUMMARY_AI_PROVIDER: ${KB_FILE_NOTES_SUMMARY_AI_PROVIDER:-}
      KB_FILE_NOTES_SUMMARY_AI_BASE_URL: ${KB_FILE_NOTES_SUMMARY_AI_BASE_URL:-}
      KB_FILE_NOTES_SUMMARY_AI_MODEL: ${KB_FILE_NOTES_SUMMARY_AI_MODEL:-}
      KB_FILE_NOTES_SUMMARY_AI_API_KEY: ${KB_FILE_NOTES_SUMMARY_AI_API_KEY:-}
      KB_EMBEDDING_AI_PROVIDER: ${KB_EMBEDDING_AI_PROVIDER:-}
      KB_EMBEDDING_AI_BASE_URL: ${KB_EMBEDDING_AI_BASE_URL:-}
      KB_EMBEDDING_AI_MODEL: ${KB_EMBEDDING_AI_MODEL:-}
      KB_EMBEDDING_AI_API_KEY: ${KB_EMBEDDING_AI_API_KEY:-}
      KB_AUDIO_AI_PROVIDER: ${KB_AUDIO_AI_PROVIDER:-}
      KB_AUDIO_AI_BASE_URL: ${KB_AUDIO_AI_BASE_URL:-}
      KB_AUDIO_AI_MODEL: ${KB_AUDIO_AI_MODEL:-}
      KB_AUDIO_AI_API_KEY: ${KB_AUDIO_AI_API_KEY:-}
      # Search and RAG Hyperparameters
      KB_SEARCH_MIN_SIMILARITY: ${KB_SEARCH_MIN_SIMILARITY:-0.35}
      KB_SEARCH_CANDIDATE_LIMIT_MULTIPLIER: ${KB_SEARCH_CANDIDATE_LIMIT_MULTIPLIER:-4}
      KB_SEARCH_HYBRID_VECTOR_WEIGHT: ${KB_SEARCH_HYBRID_VECTOR_WEIGHT:-0.4}
      KB_SEARCH_HYBRID_KEYWORD_WEIGHT: ${KB_SEARCH_HYBRID_KEYWORD_WEIGHT:-0.6}
      KB_SEARCH_RRF_K: ${KB_SEARCH_RRF_K:-20}
      KB_CODELENS_SEARCH_AI_PROVIDER: ${KB_CODELENS_SEARCH_AI_PROVIDER:-}
      KB_CODELENS_SEARCH_AI_BASE_URL: ${KB_CODELENS_SEARCH_AI_BASE_URL:-}
      KB_CODELENS_SEARCH_AI_MODEL: ${KB_CODELENS_SEARCH_AI_MODEL:-}
      KB_CODELENS_SEARCH_AI_API_KEY: ${KB_CODELENS_SEARCH_AI_API_KEY:-}
      KB_CODELENS_SEARCH_MIN_SIMILARITY: ${KB_CODELENS_SEARCH_MIN_SIMILARITY:-0.30}
      KB_CODELENS_SEARCH_CANDIDATE_LIMIT: ${KB_CODELENS_SEARCH_CANDIDATE_LIMIT:-20}
      KB_CODELENS_SEARCH_VECTOR_WEIGHT: ${KB_CODELENS_SEARCH_VECTOR_WEIGHT:-0.4}
      KB_CODELENS_SEARCH_KEYWORD_WEIGHT: ${KB_CODELENS_SEARCH_KEYWORD_WEIGHT:-0.6}
      KB_CODELENS_SEARCH_RRF_K: ${KB_CODELENS_SEARCH_RRF_K:-20}
      KB_CODELENS_SEARCH_MAX_CONCURRENCY: ${KB_CODELENS_SEARCH_MAX_CONCURRENCY:-2}
      KB_CODELENS_SEARCH_RESULT_LIMIT: ${KB_CODELENS_SEARCH_RESULT_LIMIT:-5}
      KB_RAG_MIN_SIMILARITY: ${KB_RAG_MIN_SIMILARITY:-0.45}
      KB_RAG_CANDIDATE_LIMIT: ${KB_RAG_CANDIDATE_LIMIT:-16}
      KB_RAG_HYBRID_VECTOR_WEIGHT: ${KB_RAG_HYBRID_VECTOR_WEIGHT:-0.7}
      KB_RAG_HYBRID_KEYWORD_WEIGHT: ${KB_RAG_HYBRID_KEYWORD_WEIGHT:-0.3}
      KB_RAG_TOP_CHUNKS_LIMIT: ${KB_RAG_TOP_CHUNKS_LIMIT:-10}
      KB_RAG_RRF_K: ${KB_RAG_RRF_K:-20}
      # Chunking Hyperparameters
      KB_CHUNK_TARGET_TOKENS: ${KB_CHUNK_TARGET_TOKENS:-500}
      KB_CHUNK_OVERLAP_TOKENS: ${KB_CHUNK_OVERLAP_TOKENS:-50}
      KB_CHUNK_MIN_CHARS: ${KB_CHUNK_MIN_CHARS:-30}
      KB_CHUNK_CODE_BLOCK_OVERLAP_LINES: ${KB_CHUNK_CODE_BLOCK_OVERLAP_LINES:-8}
      # Embedding Dimension
      KB_EMBEDDING_DIMENSION: ${KB_EMBEDDING_DIMENSION:-768}
      # File size limits (in bytes)
      KB_ATTACHMENT_MAX_SIZE_BYTES: ${KB_ATTACHMENT_MAX_SIZE_BYTES:-10485760}
      KB_AVATAR_MAX_SIZE_BYTES: ${KB_AVATAR_MAX_SIZE_BYTES:-3145728}
      KB_RABBITMQ_URL: ${KB_RABBITMQ_URL}
      KB_DISABLE_EMBEDDING_WORKER: ${KB_DISABLE_EMBEDDING_WORKER:-false}
      ASAAS_ACCESS_TOKEN: ${ASAAS_ACCESS_TOKEN}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      ASAAS_CUSTOMER_NOTIFICATIONS_DISABLED: ${ASAAS_CUSTOMER_NOTIFICATIONS_DISABLED:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ONLY_STRIPE: ${ONLY_STRIPE:-false}
      CHANGE_SUBSCRIPTION_WORKER_AUTORUN: ${CHANGE_SUBSCRIPTION_WORKER_AUTORUN:-false}
      BILLING_WORKER_AUTORUN: ${BILLING_WORKER_AUTORUN:-false}
      MAX_DAYS_PAST_DUE: ${MAX_DAYS_PAST_DUE:-7}
      WEBHOOK_OUTBOX_RELAY_AUTORUN: ${WEBHOOK_OUTBOX_RELAY_AUTORUN:-false}
      WEBHOOK_OUTBOX_RELAY_CRON: ${WEBHOOK_OUTBOX_RELAY_CRON:-*/1 * * * *}
      WEBHOOK_OUTBOX_RELAY_TIMEZONE: ${WEBHOOK_OUTBOX_RELAY_TIMEZONE:-America/Sao_Paulo}
      WEBHOOK_OUTBOX_RELAY_BATCH_SIZE: ${WEBHOOK_OUTBOX_RELAY_BATCH_SIZE:-100}
      WEBHOOK_OUTBOX_RELAY_MIN_AGE_SECONDS: ${WEBHOOK_OUTBOX_RELAY_MIN_AGE_SECONDS:-30}
      WEBHOOK_OUTBOX_RELAY_MAX_ATTEMPTS: ${WEBHOOK_OUTBOX_RELAY_MAX_ATTEMPTS:-10}
    ports:
      - "${KB_API_PORT:-4310}:${KB_API_PORT:-4310}"
    volumes:
      - /var/log/knowledge-base-api:/var/log/knowledge-base-api
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- "http://127.0.0.1:${KB_API_PORT:-4310}/api/health" >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${KB_RABBITMQ_USER:-kb}
      RABBITMQ_DEFAULT_PASS: ${KB_RABBITMQ_PASSWORD:-kb_dev}
    volumes:
      - kb_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - kb_ollama_data:/root/.ollama

volumes:
  kb_rabbitmq_data:
  kb_ollama_data:
