services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      KB_API_HOST: 0.0.0.0
      KB_DATABASE_URL: ${KB_DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      KB_SUPABASE_STORAGE_BUCKET: ${KB_SUPABASE_STORAGE_BUCKET}
      KB_SUPABASE_CACHE_CONTROL: ${KB_SUPABASE_CACHE_CONTROL:-31536000}
      LOG_PRETTY_CONSOLE: ${LOG_PRETTY_CONSOLE:-true}
      KB_LOG_PRETTY_CONSOLE: ${KB_LOG_PRETTY_CONSOLE:-true}
      KB_LOG_FILE_ENABLED: ${KB_LOG_FILE_ENABLED:-true}
      KB_LOG_DIR: ${KB_LOG_DIR:-/var/log/knowledge-base-api}
      KB_LOG_MAX_FILES: ${KB_LOG_MAX_FILES:-30}
      KB_LOG_MAX_SIZE: ${KB_LOG_MAX_SIZE:-20m}
      KB_LOG_LEVEL: ${KB_LOG_LEVEL:-info}
      KB_EMBEDDING_AI_PROVIDER: ${KB_EMBEDDING_AI_PROVIDER:-gemini}
      KB_EMBEDDING_AI_BASE_URL: ${KB_EMBEDDING_AI_BASE_URL}
      KB_EMBEDDING_AI_MODEL: ${KB_EMBEDDING_AI_MODEL}
      KB_EMBEDDING_AI_API_KEY: ${KB_EMBEDDING_AI_API_KEY}
      KB_AUDIO_AI_PROVIDER: ${KB_AUDIO_AI_PROVIDER:-gemini}
      KB_AUDIO_AI_BASE_URL: ${KB_AUDIO_AI_BASE_URL}
      KB_AUDIO_AI_MODEL: ${KB_AUDIO_AI_MODEL}
      KB_AUDIO_AI_API_KEY: ${KB_AUDIO_AI_API_KEY}
      KB_RABBITMQ_URL: ${KB_RABBITMQ_URL}
      KB_DISABLE_EMBEDDING_WORKER: ${KB_DISABLE_EMBEDDING_WORKER:-false}
      ASAAS_ACCESS_TOKEN: ${ASAAS_ACCESS_TOKEN}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      ASAAS_CUSTOMER_NOTIFICATIONS_DISABLED: ${ASAAS_CUSTOMER_NOTIFICATIONS_DISABLED:-false}
    ports:
      - "${KB_API_PORT:-4310}:${KB_API_PORT:-4310}"
    volumes:
      - /var/log/knowledge-base-api:/var/log/knowledge-base-api
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- "http://127.0.0.1:${KB_API_PORT:-4310}/api/health" >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${KB_RABBITMQ_USER:-kb}
      RABBITMQ_DEFAULT_PASS: ${KB_RABBITMQ_PASSWORD:-kb_dev}
    volumes:
      - kb_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  kb_rabbitmq_data:
