services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      KB_API_HOST: 0.0.0.0
      KB_DATABASE_URL: ${KB_DATABASE_URL}
      KB_LOG_PRETTY_CONSOLE: ${KB_LOG_PRETTY_CONSOLE:-false}
    ports:
      - "${KB_API_PORT:-4310}:${KB_API_PORT:-4310}"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- "http://127.0.0.1:${KB_API_PORT:-4310}/api/health" >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
