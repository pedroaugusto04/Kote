name: CI/CD Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/src/**'
      - 'backend/tests/**'
      - 'frontend/**'
      - 'scripts/deploy/**'
      - 'backend/Dockerfile'
      - 'docker-compose.prod.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'backend/tsconfig.json'
      - '.dockerignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_DEPLOY_PATH: ${{ vars.FRONTEND_DEPLOY_PATH || '/var/www/knowledge-base' }}
  RELOAD_NGINX: ${{ vars.RELOAD_NGINX || 'true' }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.backend == 'true' }}
      frontend: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.frontend == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect changed paths
        if: github.event_name != 'workflow_dispatch'
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            backend:
              - 'backend/src/**'
              - 'backend/tests/**'
              - 'scripts/deploy/**'
              - 'backend/Dockerfile'
              - 'docker-compose.prod.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - 'backend/tsconfig.json'
              - '.dockerignore'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.github/workflows/deploy.yml'

  deploy-backend:
    name: Build & Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.ref == 'refs/heads/main' && needs.changes.outputs.backend == 'true' }}
    environment: production
    permissions:
      contents: read
    env:
      KB_RUN_INTEGRATION_TESTS: ${{ vars.KB_RUN_INTEGRATION_TESTS || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run architecture lint
        run: npm run lint:architecture

      - name: Run security lint
        run: npm run lint:security

      - name: Run tests
        run: |
          if [ "$KB_RUN_INTEGRATION_TESTS" = "true" ]; then
            npm run test
          else
            npm run test:ci
          fi

      - name: Generate backend env file
        env:
          KB_REMINDER_TIMEZONE: ${{ vars.KB_REMINDER_TIMEZONE || 'America/Sao_Paulo' }}
          KB_API_HOST: ${{ vars.KB_API_HOST || '0.0.0.0' }}
          KB_API_PORT: ${{ vars.KB_API_PORT || '4310' }}
          KB_TRUST_PROXY: ${{ vars.KB_TRUST_PROXY || 'true' }}
          KB_BODY_LIMIT: ${{ vars.KB_BODY_LIMIT || '10mb' }}
          KB_PUBLIC_BASE_URL: ${{ vars.KB_PUBLIC_BASE_URL }}
          KB_API_PUBLIC_BASE_URL: ${{ vars.KB_API_PUBLIC_BASE_URL }}
          KB_ALLOWED_ORIGINS: ${{ vars.KB_ALLOWED_ORIGINS }}
          KB_ALLOWED_HOSTS: ${{ vars.KB_ALLOWED_HOSTS || '' }}
          KB_ALLOWED_EXTENSION_IDS: ${{ vars.KB_ALLOWED_EXTENSION_IDS || '' }}
          KB_ACCESS_TOKEN_TTL_SECONDS: ${{ vars.KB_ACCESS_TOKEN_TTL_SECONDS || '900' }}
          KB_REFRESH_TOKEN_TTL_SECONDS: ${{ vars.KB_REFRESH_TOKEN_TTL_SECONDS || '2592000' }}
          KB_DATABASE_URL: ${{ secrets.KB_DATABASE_URL }}
          KB_DATABASE_SSL_MODE: ${{ vars.KB_DATABASE_SSL_MODE || 'require' }}
          KB_DATABASE_SSL_REJECT_UNAUTHORIZED: ${{ vars.KB_DATABASE_SSL_REJECT_UNAUTHORIZED || 'false' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KB_SUPABASE_STORAGE_BUCKET: ${{ vars.KB_SUPABASE_STORAGE_BUCKET }}
          KB_SUPABASE_CACHE_CONTROL: ${{ vars.KB_SUPABASE_CACHE_CONTROL || '31536000' }}
          KB_ADMIN_EMAIL: ${{ secrets.KB_ADMIN_EMAIL }}
          KB_ADMIN_PASSWORD: ${{ secrets.KB_ADMIN_PASSWORD }}
          KB_JWT_ACCESS_SECRET: ${{ secrets.KB_JWT_ACCESS_SECRET }}
          KB_JWT_REFRESH_SECRET: ${{ secrets.KB_JWT_REFRESH_SECRET }}
          KB_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.KB_GOOGLE_OAUTH_CLIENT_ID || '' }}
          KB_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.KB_GOOGLE_OAUTH_CLIENT_SECRET || '' }}
          KB_GOOGLE_OAUTH_REDIRECT_URI: ${{ vars.KB_GOOGLE_OAUTH_REDIRECT_URI || '' }}
          KB_INTERNAL_SERVICE_TOKEN: ${{ secrets.KB_INTERNAL_SERVICE_TOKEN }}
          KB_CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.KB_CREDENTIALS_ENCRYPTION_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PUBLISHABLE_KEY || '' }}
          KB_GITHUB_APP_INSTALL_URL: ${{ vars.KB_GITHUB_APP_INSTALL_URL || '' }}
          KB_GITHUB_APP_ID: ${{ secrets.KB_GITHUB_APP_ID || '' }}
          KB_GITHUB_APP_PRIVATE_KEY: ${{ secrets.KB_GITHUB_APP_PRIVATE_KEY || '' }}
          KB_GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.KB_GITHUB_APP_WEBHOOK_SECRET || '' }}
          KB_GITHUB_APP_CALLBACK_PATH: ${{ vars.KB_GITHUB_APP_CALLBACK_PATH || '' }}
          KB_GITHUB_BACKFILL_LIMIT: ${{ vars.KB_GITHUB_BACKFILL_LIMIT || '5' }}
          KB_WPP_WEBHOOK_API_KEY: ${{ secrets.KB_WPP_WEBHOOK_API_KEY || '' }}
          EVOLUTION_API_URL: ${{ vars.EVOLUTION_API_URL || '' }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY || '' }}
          EVOLUTION_INSTANCE_NAME: ${{ vars.EVOLUTION_INSTANCE_NAME || '' }}
          EVOLUTION_API_PUBLIC_URL: ${{ vars.EVOLUTION_API_PUBLIC_URL || '' }}
          KB_WPP_PAIRING_URL: ${{ vars.KB_WPP_PAIRING_URL || '' }}
          KB_TELEGRAM_BOT_TOKEN: ${{ secrets.KB_TELEGRAM_BOT_TOKEN || '' }}
          KB_TELEGRAM_WEBHOOK_TOKEN: ${{ secrets.KB_TELEGRAM_WEBHOOK_TOKEN || '' }}
          KB_TELEGRAM_CHAT_ID: ${{ vars.KB_TELEGRAM_CHAT_ID || '' }}
          WPP_CONVERSATION_TIMEOUT_MS: ${{ vars.WPP_CONVERSATION_TIMEOUT_MS || '600000' }}
          KB_REVIEW_AI_PROVIDER: ${{ vars.KB_REVIEW_AI_PROVIDER || 'openrouter' }}
          KB_REVIEW_AI_BASE_URL: ${{ vars.KB_REVIEW_AI_BASE_URL || 'https://openrouter.ai/api/v1' }}
          KB_REVIEW_AI_MODEL: ${{ vars.KB_REVIEW_AI_MODEL || 'openrouter/auto' }}
          KB_REVIEW_AI_API_KEY: ${{ secrets.KB_REVIEW_AI_API_KEY || '' }}
          KB_CONVERSATION_AI_PROVIDER: ${{ vars.KB_CONVERSATION_AI_PROVIDER || 'openrouter' }}
          KB_CONVERSATION_AI_BASE_URL: ${{ vars.KB_CONVERSATION_AI_BASE_URL || 'https://openrouter.ai/api/v1' }}
          KB_CONVERSATION_AI_MODEL: ${{ vars.KB_CONVERSATION_AI_MODEL || 'openrouter/auto' }}
          KB_CONVERSATION_AI_API_KEY: ${{ secrets.KB_CONVERSATION_AI_API_KEY || '' }}
          KB_PROJECT_BRIEF_AI_PROVIDER: ${{ vars.KB_PROJECT_BRIEF_AI_PROVIDER || '' }}
          KB_PROJECT_BRIEF_AI_BASE_URL: ${{ vars.KB_PROJECT_BRIEF_AI_BASE_URL || '' }}
          KB_PROJECT_BRIEF_AI_MODEL: ${{ vars.KB_PROJECT_BRIEF_AI_MODEL || '' }}
          KB_PROJECT_BRIEF_AI_API_KEY: ${{ secrets.KB_PROJECT_BRIEF_AI_API_KEY || '' }}
          KB_FILE_NOTES_SUMMARY_AI_PROVIDER: ${{ vars.KB_FILE_NOTES_SUMMARY_AI_PROVIDER || '' }}
          KB_FILE_NOTES_SUMMARY_AI_BASE_URL: ${{ vars.KB_FILE_NOTES_SUMMARY_AI_BASE_URL || '' }}
          KB_FILE_NOTES_SUMMARY_AI_MODEL: ${{ vars.KB_FILE_NOTES_SUMMARY_AI_MODEL || '' }}
          KB_FILE_NOTES_SUMMARY_AI_API_KEY: ${{ secrets.KB_FILE_NOTES_SUMMARY_AI_API_KEY || '' }}
          KB_PR_CONTEXT_AI_PROVIDER: ${{ vars.KB_PR_CONTEXT_AI_PROVIDER || '' }}
          KB_PR_CONTEXT_AI_BASE_URL: ${{ vars.KB_PR_CONTEXT_AI_BASE_URL || '' }}
          KB_PR_CONTEXT_AI_MODEL: ${{ vars.KB_PR_CONTEXT_AI_MODEL || '' }}
          KB_PR_CONTEXT_AI_API_KEY: ${{ secrets.KB_PR_CONTEXT_AI_API_KEY || '' }}
          KB_EMBEDDING_AI_PROVIDER: ${{ vars.KB_EMBEDDING_AI_PROVIDER || 'gemini' }}
          KB_EMBEDDING_AI_BASE_URL: ${{ vars.KB_EMBEDDING_AI_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta' }}
          KB_EMBEDDING_AI_MODEL: ${{ vars.KB_EMBEDDING_AI_MODEL || 'gemini-embedding-001' }}
          KB_EMBEDDING_AI_API_KEY: ${{ secrets.KB_EMBEDDING_AI_API_KEY || '' }}
          KB_SEARCH_MIN_SIMILARITY: ${{ vars.KB_SEARCH_MIN_SIMILARITY || '0.3' }}
          KB_SEARCH_CANDIDATE_LIMIT_MULTIPLIER: ${{ vars.KB_SEARCH_CANDIDATE_LIMIT_MULTIPLIER || '3' }}
          KB_SEARCH_HYBRID_VECTOR_WEIGHT: ${{ vars.KB_SEARCH_HYBRID_VECTOR_WEIGHT || '0.4' }}
          KB_SEARCH_HYBRID_KEYWORD_WEIGHT: ${{ vars.KB_SEARCH_HYBRID_KEYWORD_WEIGHT || '0.6' }}
          KB_SEARCH_RRF_K: ${{ vars.KB_SEARCH_RRF_K || '20' }}
          KB_CODELENS_SEARCH_AI_PROVIDER: ${{ vars.KB_CODELENS_SEARCH_AI_PROVIDER || '' }}
          KB_CODELENS_SEARCH_AI_BASE_URL: ${{ vars.KB_CODELENS_SEARCH_AI_BASE_URL || '' }}
          KB_CODELENS_SEARCH_AI_MODEL: ${{ vars.KB_CODELENS_SEARCH_AI_MODEL || '' }}
          KB_CODELENS_SEARCH_AI_API_KEY: ${{ secrets.KB_CODELENS_SEARCH_AI_API_KEY || '' }}
          KB_CODELENS_SEARCH_MIN_SIMILARITY: ${{ vars.KB_CODELENS_SEARCH_MIN_SIMILARITY || '0.30' }}
          KB_CODELENS_SEARCH_CANDIDATE_LIMIT: ${{ vars.KB_CODELENS_SEARCH_CANDIDATE_LIMIT || '20' }}
          KB_CODELENS_SEARCH_VECTOR_WEIGHT: ${{ vars.KB_CODELENS_SEARCH_VECTOR_WEIGHT || '0.4' }}
          KB_CODELENS_SEARCH_KEYWORD_WEIGHT: ${{ vars.KB_CODELENS_SEARCH_KEYWORD_WEIGHT || '0.6' }}
          KB_CODELENS_SEARCH_RRF_K: ${{ vars.KB_CODELENS_SEARCH_RRF_K || '20' }}
          KB_CODELENS_SEARCH_MAX_CONCURRENCY: ${{ vars.KB_CODELENS_SEARCH_MAX_CONCURRENCY || '2' }}
          KB_CODELENS_SEARCH_RESULT_LIMIT: ${{ vars.KB_CODELENS_SEARCH_RESULT_LIMIT || '5' }}
          KB_RAG_MIN_SIMILARITY: ${{ vars.KB_RAG_MIN_SIMILARITY || '0.65' }}
          KB_RAG_CANDIDATE_LIMIT: ${{ vars.KB_RAG_CANDIDATE_LIMIT || '16' }}
          KB_RAG_HYBRID_VECTOR_WEIGHT: ${{ vars.KB_RAG_HYBRID_VECTOR_WEIGHT || '0.7' }}
          KB_RAG_HYBRID_KEYWORD_WEIGHT: ${{ vars.KB_RAG_HYBRID_KEYWORD_WEIGHT || '0.3' }}
          KB_RAG_TOP_CHUNKS_LIMIT: ${{ vars.KB_RAG_TOP_CHUNKS_LIMIT || '10' }}
          KB_RAG_RRF_K: ${{ vars.KB_RAG_RRF_K || '20' }}
          KB_CHUNK_TARGET_TOKENS: ${{ vars.KB_CHUNK_TARGET_TOKENS || '500' }}
          KB_CHUNK_OVERLAP_TOKENS: ${{ vars.KB_CHUNK_OVERLAP_TOKENS || '50' }}
          KB_CHUNK_MIN_CHARS: ${{ vars.KB_CHUNK_MIN_CHARS || '30' }}
          KB_CHUNK_CODE_BLOCK_OVERLAP_LINES: ${{ vars.KB_CHUNK_CODE_BLOCK_OVERLAP_LINES || '8' }}
          KB_EMBEDDING_DIMENSION: ${{ vars.KB_EMBEDDING_DIMENSION || '768' }}
          KB_ATTACHMENT_MAX_SIZE_BYTES: ${{ vars.KB_ATTACHMENT_MAX_SIZE_BYTES || '10485760' }}
          KB_AVATAR_MAX_SIZE_BYTES: ${{ vars.KB_AVATAR_MAX_SIZE_BYTES || '3145728' }}
          KB_AUDIO_AI_PROVIDER: ${{ vars.KB_AUDIO_AI_PROVIDER || 'gemini' }}
          KB_AUDIO_AI_BASE_URL: ${{ vars.KB_AUDIO_AI_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta' }}
          KB_AUDIO_AI_MODEL: ${{ vars.KB_AUDIO_AI_MODEL || 'gemini-2.5-flash' }}
          KB_AUDIO_AI_API_KEY: ${{ secrets.KB_AUDIO_AI_API_KEY || '' }}
          # Full email configuration (provider, SMTP host/port, from, queues, worker flags)
          KB_EMAIL_PROVIDER: ${{ vars.KB_EMAIL_PROVIDER || 'resend' }}
          KB_EMAIL_FROM: ${{ vars.KB_EMAIL_FROM || vars.KB_ADMIN_EMAIL || '' }}
          KB_EMAIL_SMTP_HOST: ${{ vars.KB_EMAIL_SMTP_HOST || '' }}
          KB_EMAIL_SMTP_PORT: ${{ vars.KB_EMAIL_SMTP_PORT || '587' }}
          KB_EMAIL_SMTP_SECURE: ${{ vars.KB_EMAIL_SMTP_SECURE || 'false' }}
          KB_EMAIL_QUEUE_EXCHANGE: ${{ vars.KB_EMAIL_QUEUE_EXCHANGE || 'kb.email' }}
          KB_EMAIL_QUEUE_NAME: ${{ vars.KB_EMAIL_QUEUE_NAME || 'kb.email.send' }}
          KB_EMAIL_QUEUE_ROUTING_KEY: ${{ vars.KB_EMAIL_QUEUE_ROUTING_KEY || 'kb.email.send' }}
          KB_EMAIL_WORKER_AUTORUN: ${{ vars.KB_EMAIL_WORKER_AUTORUN || 'true' }}
          KB_EMAIL_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
          KB_EMAIL_SMTP_USER: ${{ secrets.SMTP_USER || '' }}
          KB_EMAIL_SMTP_PASS: ${{ secrets.SMTP_PASS || '' }}
          KB_RABBITMQ_URL: ${{ secrets.KB_RABBITMQ_URL || '' }}
          KB_RABBITMQ_USER: ${{ vars.KB_RABBITMQ_USER || 'kb' }}
          KB_RABBITMQ_PASSWORD: ${{ secrets.KB_RABBITMQ_PASSWORD || '' }}
          KB_RABBITMQ_PORT: ${{ vars.KB_RABBITMQ_PORT || '5672' }}
          KB_RABBITMQ_MANAGEMENT_PORT: ${{ vars.KB_RABBITMQ_MANAGEMENT_PORT || '15672' }}
          KB_DISABLE_EMBEDDING_WORKER: ${{ vars.KB_DISABLE_EMBEDDING_WORKER || 'false' }}
          KB_OLLAMA_PORT: ${{ vars.KB_OLLAMA_PORT || '11434' }}
          KB_VAPID_PUBLIC_KEY: ${{ vars.KB_VAPID_PUBLIC_KEY || '' }}
          KB_VAPID_PRIVATE_KEY: ${{ secrets.KB_VAPID_PRIVATE_KEY || '' }}
          ASAAS_ACCESS_TOKEN: ${{ secrets.ASAAS_ACCESS_TOKEN || '' }}
          ASAAS_BASE_URL: ${{ vars.ASAAS_BASE_URL || '' }}
          ASAAS_WEBHOOK_TOKEN: ${{ secrets.ASAAS_WEBHOOK_TOKEN || '' }}
          ASAAS_CUSTOMER_NOTIFICATIONS_DISABLED: ${{ vars.ASAAS_CUSTOMER_NOTIFICATIONS_DISABLED || 'false' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || '' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || '' }}
          ONLY_STRIPE: ${{ vars.ONLY_STRIPE || 'false' }}
          CHANGE_SUBSCRIPTION_WORKER_AUTORUN: ${{ vars.CHANGE_SUBSCRIPTION_WORKER_AUTORUN || 'false' }}
          BILLING_WORKER_AUTORUN: ${{ vars.BILLING_WORKER_AUTORUN || 'false' }}
          MAX_DAYS_PAST_DUE: ${{ vars.MAX_DAYS_PAST_DUE || '7' }}
          WEBHOOK_OUTBOX_RELAY_AUTORUN: ${{ vars.WEBHOOK_OUTBOX_RELAY_AUTORUN || 'false' }}
          WEBHOOK_OUTBOX_RELAY_CRON: ${{ vars.WEBHOOK_OUTBOX_RELAY_CRON || '*/1 * * * *' }}
          WEBHOOK_OUTBOX_RELAY_TIMEZONE: ${{ vars.WEBHOOK_OUTBOX_RELAY_TIMEZONE || 'America/Sao_Paulo' }}
          WEBHOOK_OUTBOX_RELAY_BATCH_SIZE: ${{ vars.WEBHOOK_OUTBOX_RELAY_BATCH_SIZE || '100' }}
          WEBHOOK_OUTBOX_RELAY_MIN_AGE_SECONDS: ${{ vars.WEBHOOK_OUTBOX_RELAY_MIN_AGE_SECONDS || '30' }}
          WEBHOOK_OUTBOX_RELAY_MAX_ATTEMPTS: ${{ vars.WEBHOOK_OUTBOX_RELAY_MAX_ATTEMPTS || '10' }}
          DEV_EMAIL: ${{ vars.DEV_EMAIL || '' }}
          DEV_EMAIL_INTERCEPT: ${{ vars.DEV_EMAIL_INTERCEPT || 'false' }}
          # Test email authentication secret
          KB_TEST_EMAIL_AUTH_SECRET: ${{ secrets.KB_TEST_EMAIL_AUTH_SECRET || '' }}
          # Email branding
          APP_NAME: ${{ vars.APP_NAME || 'Knowledge Base' }}
          APP_LOGO_URL: ${{ vars.APP_LOGO_URL || '' }}
        run: bash scripts/deploy/generate-backend-env.sh .deploy/backend.env

      - name: Validate production environment config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_GITHUB_REPO_TOKEN: ${{ secrets.VPS_GITHUB_REPO_TOKEN }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
          KB_PUBLIC_BASE_URL: ${{ vars.KB_PUBLIC_BASE_URL }}
          KB_API_PUBLIC_BASE_URL: ${{ vars.KB_API_PUBLIC_BASE_URL }}
          KB_ALLOWED_ORIGINS: ${{ vars.KB_ALLOWED_ORIGINS }}
          KB_DATABASE_URL: ${{ secrets.KB_DATABASE_URL }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KB_SUPABASE_STORAGE_BUCKET: ${{ vars.KB_SUPABASE_STORAGE_BUCKET }}
          KB_ADMIN_EMAIL: ${{ secrets.KB_ADMIN_EMAIL }}
          KB_ADMIN_PASSWORD: ${{ secrets.KB_ADMIN_PASSWORD }}
          KB_JWT_ACCESS_SECRET: ${{ secrets.KB_JWT_ACCESS_SECRET }}
          KB_JWT_REFRESH_SECRET: ${{ secrets.KB_JWT_REFRESH_SECRET }}
          KB_INTERNAL_SERVICE_TOKEN: ${{ secrets.KB_INTERNAL_SERVICE_TOKEN }}
          KB_CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.KB_CREDENTIALS_ENCRYPTION_KEY }}
          KB_EMAIL_PROVIDER: ${{ vars.KB_EMAIL_PROVIDER || 'resend' }}
          KB_EMAIL_FROM: ${{ vars.KB_EMAIL_FROM || vars.KB_ADMIN_EMAIL || '' }}
          KB_EMAIL_SMTP_HOST: ${{ vars.KB_EMAIL_SMTP_HOST || '' }}
          KB_EMAIL_SMTP_PORT: ${{ vars.KB_EMAIL_SMTP_PORT || '587' }}
          KB_EMAIL_SMTP_SECURE: ${{ vars.KB_EMAIL_SMTP_SECURE || 'false' }}
          KB_EMAIL_QUEUE_EXCHANGE: ${{ vars.KB_EMAIL_QUEUE_EXCHANGE || 'kb.email' }}
          KB_EMAIL_QUEUE_NAME: ${{ vars.KB_EMAIL_QUEUE_NAME || 'kb.email.send' }}
          KB_EMAIL_QUEUE_ROUTING_KEY: ${{ vars.KB_EMAIL_QUEUE_ROUTING_KEY || 'kb.email.send' }}
          KB_EMAIL_WORKER_AUTORUN: ${{ vars.KB_EMAIL_WORKER_AUTORUN || 'true' }}
          KB_EMAIL_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
          KB_EMAIL_SMTP_USER: ${{ secrets.SMTP_USER || '' }}
          KB_EMAIL_SMTP_PASS: ${{ secrets.SMTP_PASS || '' }}
          STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PUBLISHABLE_KEY || '' }}
          # Email branding
          APP_NAME: ${{ vars.APP_NAME || 'Knowledge Base' }}
          APP_LOGO_URL: ${{ vars.APP_LOGO_URL || '' }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST" || { echo "Missing secret: VPS_HOST"; exit 1; }
          test -n "$VPS_USER" || { echo "Missing secret: VPS_USER"; exit 1; }
          test -n "$VPS_SSH_PORT" || { echo "Missing secret/variable: VPS_SSH_PORT"; exit 1; }
          test -n "$VPS_SSH_PRIVATE_KEY" || { echo "Missing secret: VPS_SSH_PRIVATE_KEY"; exit 1; }
          test -n "$VPS_GITHUB_REPO_TOKEN" || { echo "Missing secret: VPS_GITHUB_REPO_TOKEN"; exit 1; }
          test -n "$VPS_APP_DIR" || { echo "Missing variable: VPS_APP_DIR"; exit 1; }
          test -n "$KB_PUBLIC_BASE_URL" || { echo "Missing variable: KB_PUBLIC_BASE_URL"; exit 1; }
          test -n "$KB_API_PUBLIC_BASE_URL" || { echo "Missing variable: KB_API_PUBLIC_BASE_URL"; exit 1; }
          test -n "$KB_ALLOWED_ORIGINS" || { echo "Missing variable: KB_ALLOWED_ORIGINS"; exit 1; }
          test -n "$KB_DATABASE_URL" || { echo "Missing secret: KB_DATABASE_URL"; exit 1; }
          test -n "$SUPABASE_URL" || { echo "Missing variable: SUPABASE_URL"; exit 1; }
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY"; exit 1; }
          test -n "$KB_SUPABASE_STORAGE_BUCKET" || { echo "Missing variable: KB_SUPABASE_STORAGE_BUCKET"; exit 1; }
          test -n "$KB_ADMIN_EMAIL" || { echo "Missing secret: KB_ADMIN_EMAIL"; exit 1; }
          test -n "$KB_ADMIN_PASSWORD" || { echo "Missing secret: KB_ADMIN_PASSWORD"; exit 1; }
          test -n "$KB_JWT_ACCESS_SECRET" || { echo "Missing secret: KB_JWT_ACCESS_SECRET"; exit 1; }
          test -n "$KB_JWT_REFRESH_SECRET" || { echo "Missing secret: KB_JWT_REFRESH_SECRET"; exit 1; }
          test -n "$KB_INTERNAL_SERVICE_TOKEN" || { echo "Missing secret: KB_INTERNAL_SERVICE_TOKEN"; exit 1; }
          test -n "$KB_CREDENTIALS_ENCRYPTION_KEY" || { echo "Missing secret: KB_CREDENTIALS_ENCRYPTION_KEY"; exit 1; }
          test -n "$STRIPE_PUBLISHABLE_KEY" || { echo "Missing variable: STRIPE_PUBLISHABLE_KEY"; exit 1; }

      - name: Ensure rsync is available on GitHub runner
        run: |
          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Prepare SSH for VPS sync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.VPS_HOST }}
          SERVER_USER: ${{ secrets.VPS_USER }}
          SERVER_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%b\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" -o StrictHostKeyChecking=yes "$SERVER_USER@$SERVER_HOST" \
            "command -v rsync >/dev/null 2>&1 || { echo 'rsync nao encontrado no servidor remoto'; exit 1; }; mkdir -p \"$VPS_APP_DIR\""

      - name: Sync backend env to VPS
        env:
          SERVER_HOST: ${{ secrets.VPS_HOST }}
          SERVER_USER: ${{ secrets.VPS_USER }}
          SERVER_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT -o StrictHostKeyChecking=yes" \
            .deploy/backend.env "$SERVER_USER@$SERVER_HOST:$VPS_APP_DIR/backend.env"

      - name: Deploy backend on VPS
        uses: appleboy/ssh-action@v1.2.4
        env:
          VPS_GITHUB_REPO_TOKEN: ${{ secrets.VPS_GITHUB_REPO_TOKEN }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: VPS_GITHUB_REPO_TOKEN,VPS_APP_DIR
          script: |
            set -euo pipefail
            cd "$VPS_APP_DIR"
            chmod 600 backend.env
            # Force overwrite .env.prod with fresh backend.env
            cp -f backend.env .env.prod
            GITHUB_AUTH_HEADER="$(printf 'x-access-token:%s' "$VPS_GITHUB_REPO_TOKEN" | base64 | tr -d '\n')"
            git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $GITHUB_AUTH_HEADER" fetch --all --prune
            git checkout main
            # Keep VPS working tree deterministic for deploys; discard local tracked drift.
            git reset --hard origin/main
            # Force overwrite again after git pull to ensure latest env
            cp -f backend.env .env.prod
            # Force rebuild without cache to ensure latest code
            sudo docker compose --env-file .env.prod -f docker-compose.prod.yml build --no-cache api
            sudo docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans api
            sudo docker compose --env-file .env.prod -f docker-compose.prod.yml exec -T api node backend/dist/infrastructure/persistence/run-migrations.js
            sudo docker image prune -f

  deploy-frontend:
    name: Build & Deploy Frontend to VPS
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.ref == 'refs/heads/main' && needs.changes.outputs.frontend == 'true' }}
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run architecture lint
        run: npm run lint:architecture

      - name: Update sitemap lastmod date
        run: bash scripts/deploy/update-sitemap.sh

      - name: Build frontend
        env:
          VITE_KB_FRONTEND_BASE_PATH: ${{ vars.VITE_KB_FRONTEND_BASE_PATH || '/kote/' }}
          VITE_KB_API_BASE_PATH: ${{ vars.VITE_KB_API_BASE_PATH || '/kote/api' }}
          VITE_WHATSAPP_NUMBER: ${{ vars.VITE_WHATSAPP_NUMBER || '' }}
          VITE_TELEGRAM_BOT_USERNAME: ${{ vars.VITE_TELEGRAM_BOT_USERNAME || '' }}
          VITE_ATTACHMENT_MAX_SIZE_BYTES: ${{ vars.VITE_ATTACHMENT_MAX_SIZE_BYTES || '10485760' }}
        run: npm run build:frontend

      - name: Ensure rsync is available on GitHub runner
        run: |
          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Prepare SSH for frontend sync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.VPS_HOST }}
          SERVER_USER: ${{ secrets.VPS_USER }}
          SERVER_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          FRONTEND_DEPLOY_PATH: ${{ env.FRONTEND_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$FRONTEND_DEPLOY_PATH" || { echo "Missing variable: FRONTEND_DEPLOY_PATH"; exit 1; }
          mkdir -p ~/.ssh
          printf '%b\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" -o StrictHostKeyChecking=yes "$SERVER_USER@$SERVER_HOST" \
            "command -v rsync >/dev/null 2>&1 || { echo 'rsync nao encontrado no servidor remoto'; exit 1; }; sudo mkdir -p \"$FRONTEND_DEPLOY_PATH\"; sudo chown \"$SERVER_USER\":\"$SERVER_USER\" \"$FRONTEND_DEPLOY_PATH\""

      - name: Sync frontend dist to VPS
        env:
          SERVER_HOST: ${{ secrets.VPS_HOST }}
          SERVER_USER: ${{ secrets.VPS_USER }}
          SERVER_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          FRONTEND_DEPLOY_PATH: ${{ env.FRONTEND_DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT -o StrictHostKeyChecking=yes" \
            dist/frontend/ "$SERVER_USER@$SERVER_HOST:$FRONTEND_DEPLOY_PATH/"

      - name: Reload Nginx
        if: ${{ env.RELOAD_NGINX != 'false' }}
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            if command -v nginx >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^nginx.service'; then
              sudo nginx -t
              sudo systemctl reload nginx
            else
              echo "Nginx nao instalado; pulando reload."
            fi
