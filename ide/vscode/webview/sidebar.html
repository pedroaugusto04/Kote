<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-${nonce}';" />
  <title>Kote</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gap: 8px;
      --radius: 6px;
      --font: var(--vscode-font-family, system-ui, sans-serif);
    }

    body {
      font-family: var(--font);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background);
      padding: 12px 10px;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .workspace-name {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--vscode-descriptionForeground);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--vscode-testing-iconPassed, #4caf50);
      flex-shrink: 0;
    }
    .status-dot.error { background: var(--vscode-testing-iconFailed, #f44336); }
    .status-dot.loading { background: var(--vscode-descriptionForeground); animation: pulse 1.2s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Project selector ────────────────────────────── */
    .project-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 12px;
    }
    select {
      flex: 1;
      background: var(--vscode-dropdown-background);
      color: var(--vscode-dropdown-foreground);
      border: 1px solid var(--vscode-dropdown-border);
      border-radius: var(--radius);
      padding: 5px 8px;
      font-size: inherit;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--vscode-focusBorder); }

    .icon-btn {
      background: none;
      border: none;
      color: var(--vscode-descriptionForeground);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { background: var(--vscode-toolbar-hoverBackground); color: var(--vscode-foreground); }

    /* ── Ask KB button ───────────────────────────────── */
    .btn-ask {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 9px 14px;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      transition: opacity .15s;
    }
    .btn-ask:hover { opacity: .88; }
    .btn-ask svg { flex-shrink: 0; }

    /* ── Section ─────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--vscode-descriptionForeground);
    }
    .section-count {
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
      background: var(--vscode-badge-background);
      color: var(--vscode-badge-foreground);
      border-radius: 8px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    /* ── Note row ────────────────────────────────────── */
    .note-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }

    .note-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .1s;
    }
    .note-row:hover { background: var(--vscode-list-hoverBackground); }

    .note-icon { font-size: 13px; flex-shrink: 0; padding-top: 1px; }

    .note-body { flex: 1; min-width: 0; }
    .note-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--vscode-foreground);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .note-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    /* ── Badges ──────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: .04em;
      flex-shrink: 0;
    }
    .badge-decision  { background: #78350f33; color: #f59e0b; }
    .badge-incident  { background: #7f1d1d33; color: #f87171; }
    .badge-knowledge { background: #1e3a5f33; color: #60a5fa; }
    .badge-followup  { background: #1a2e1a33; color: #4ade80; }
    .badge-event     { background: #2d2d3f33; color: #a78bfa; }
    .badge-pending   { background: #78350f33; color: #fb923c; }
    .badge-overdue   { background: #7f1d1d33; color: #f87171; }
    .badge-push      { background: #0c2a4033; color: #38bdf8; }

    .note-time {
      font-size: 10px;
      color: var(--vscode-descriptionForeground);
    }

    /* ── Reminder row ────────────────────────────────── */
    .reminder-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: var(--radius);
    }
    .reminder-overdue .reminder-title { color: #f87171; }
    .reminder-title {
      font-size: 12px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Empty state ─────────────────────────────────── */
    .empty {
      font-size: 12px;
      color: var(--vscode-descriptionForeground);
      padding: 8px 8px;
      font-style: italic;
    }

    /* ── Error ───────────────────────────────────────── */
    .error-box {
      background: var(--vscode-inputValidation-errorBackground);
      border: 1px solid var(--vscode-inputValidation-errorBorder);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--vscode-errorForeground);
      margin-bottom: 12px;
    }

    /* ── Skeleton ────────────────────────────────────── */
    .skeleton {
      background: var(--vscode-input-background);
      border-radius: 4px;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-row { height: 36px; margin-bottom: 4px; }
    @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.8} }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="workspace-name" id="workspaceName">Kote</span>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="icon-btn" id="btnRefresh" title="Refresh">↺</button>
      <div class="status-dot loading" id="statusDot"></div>
    </div>
  </div>

  <!-- Project selector -->
  <div class="project-row">
    <select id="projectSelect" title="Active project">
      <option value="">Loading projects…</option>
    </select>
  </div>

  <!-- Ask KB button -->
  <button class="btn-ask" id="btnAsk">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Ask KB
  </button>

  <!-- Error box -->
  <div class="error-box" id="errorBox" style="display:none"></div>

  <!-- Recent notes -->
  <div class="section-header">
    <span class="section-title">Recent Notes</span>
    <span class="section-count" id="notesCount">–</span>
  </div>
  <div class="note-list" id="noteList">
    <div class="skeleton skeleton-row"></div>
    <div class="skeleton skeleton-row"></div>
    <div class="skeleton skeleton-row"></div>
  </div>

  <!-- Reminders -->
  <div class="section-header">
    <span class="section-title">Reminders</span>
    <span class="section-count" id="remindersCount">–</span>
  </div>
  <div class="note-list" id="reminderList">
    <div class="skeleton skeleton-row"></div>
  </div>

<script nonce="${nonce}">
  const vscode = acquireVsCodeApi();
  let state = vscode.getState() ?? {};

  // ── Helpers ──────────────────────────────────────────────────────────────

  function typeIcon(type) {
    const icons = {
      decision: '📌', incident: '🚨', knowledge: '📚',
      followup: '🔁', event: '📝', push: '⬆', review: '👁',
    };
    return icons[type] ?? '📄';
  }

  function badgeClass(type, status) {
    if (status === 'overdue') return 'badge-overdue';
    if (status === 'pending') return 'badge-pending';
    const map = {
      decision: 'badge-decision', incident: 'badge-incident',
      knowledge: 'badge-knowledge', followup: 'badge-followup',
      push: 'badge-push', 'github-push': 'badge-push',
    };
    return map[type] ?? 'badge-event';
  }

  function relativeTime(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 2) return 'just now';
    if (min < 60) return `${min}m ago`;
    const h = Math.floor(min / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function capitalize(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
  }

  // ── Render ───────────────────────────────────────────────────────────────

  function renderNotes(notes) {
    const el = document.getElementById('noteList');
    document.getElementById('notesCount').textContent = String(notes.length);
    if (!notes.length) {
      el.innerHTML = '<div class="empty">No recent notes.</div>';
      return;
    }
    el.innerHTML = notes.map(n => `
      <div class="note-row" title="${escHtml(n.title)}">
        <span class="note-icon">${typeIcon(n.canonicalType)}</span>
        <div class="note-body">
          <div class="note-title">${escHtml(n.title)}</div>
          <div class="note-meta">
            <span class="badge ${badgeClass(n.canonicalType, n.status)}">${capitalize(n.canonicalType || n.status)}</span>
            <span class="note-time">${relativeTime(n.updatedAt || n.createdAt)}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderReminders(reminders) {
    const el = document.getElementById('reminderList');
    document.getElementById('remindersCount').textContent = String(reminders.length);
    if (!reminders.length) {
      el.innerHTML = '<div class="empty">No pending reminders. 🎉</div>';
      return;
    }
    el.innerHTML = reminders.map(r => {
      const isOverdue = r.status === 'overdue';
      return `
        <div class="reminder-row ${isOverdue ? 'reminder-overdue' : ''}">
          <span>${isOverdue ? '⏰' : '🕐'}</span>
          <div class="reminder-title">${escHtml(r.title)}</div>
          <span class="badge ${isOverdue ? 'badge-overdue' : 'badge-pending'}">${isOverdue ? 'Overdue' : 'Pending'}</span>
        </div>
      `;
    }).join('');
  }

  function renderProjects(projects, current) {
    const sel = document.getElementById('projectSelect');
    sel.innerHTML = projects.map(p =>
      `<option value="${escAttr(p.projectSlug)}" ${p.projectSlug === current ? 'selected' : ''}>${escHtml(p.displayName)}</option>`
    ).join('');
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) { return escHtml(s); }

  function setStatus(type) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (type === 'error' ? ' error' : type === 'loading' ? ' loading' : '');
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.style.display = msg ? '' : 'none';
    setStatus('error');
  }

  // ── Actions ──────────────────────────────────────────────────────────────

  function openChat() { vscode.postMessage({ type: 'openChat' }); }
  function refresh() { vscode.postMessage({ type: 'refresh' }); }
  function changeProject(slug) { vscode.postMessage({ type: 'changeProject', projectSlug: slug }); }

  // ── Message handler ──────────────────────────────────────────────────────

  window.addEventListener('message', ({ data }) => {
    const msg = data;
    switch (msg.type) {
      case 'loading':
        setStatus('loading');
        showError('');
        break;

      case 'init': {
        document.getElementById('workspaceName').textContent = msg.workspace || 'Kote';
        renderProjects(msg.projects, msg.project);
        renderNotes(msg.notes);
        renderReminders(msg.reminders);
        setStatus('ok');
        break;
      }

      case 'refresh': {
        renderNotes(msg.notes);
        renderReminders(msg.reminders);
        setStatus('ok');
        break;
      }

      case 'projectChanged': {
        document.getElementById('projectSelect').value = msg.project;
        renderNotes(msg.notes);
        renderReminders(msg.reminders);
        setStatus('ok');
        break;
      }

      case 'error':
        showError(msg.message);
        break;
    }
  });

  // Bind events
  document.getElementById('btnRefresh').addEventListener('click', refresh);
  document.getElementById('btnAsk').addEventListener('click', openChat);
  document.getElementById('projectSelect').addEventListener('change', (e) => {
    changeProject(e.target.value);
  });

  // Tell extension we're ready
  vscode.postMessage({ type: 'ready' });
</script>
</body>
</html>
