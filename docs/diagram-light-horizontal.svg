<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Connection Lines (Inputs -> API) -->
  <g fill="none" stroke="#cbd5e1" stroke-width="1.2">
    <path d="M 270,47 C 310,47 310,125 350,125" marker-end="url(#arrow-gray)"/>
    <path d="M 270,127 L 350,127" marker-end="url(#arrow-gray)"/>
    <path d="M 270,207 C 310,207 310,125 350,125" marker-end="url(#arrow-gray)"/>
  </g>

  <!-- Connection Lines (API -> Database & UI) -->
  <g fill="none" stroke="#0284c7" stroke-width="1.5">
    <path d="M 470,125 C 520,125 530,77.5 580,77.5" marker-end="url(#arrow-cyan)"/>
    <path d="M 470,125 C 520,125 530,177.5 580,177.5" marker-end="url(#arrow-cyan)"/>
  </g>

  <!-- Connection Line (Database -> UI) -->
  <path d="M 670,105 L 670,144" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow-gray)"/>

  <!-- Left Column: Input Sources -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Card 1: VS Code & CLI -->
    <rect x="40" y="20" width="230" height="54" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- VS Code Icon (Brackets/Code) -->
    <g transform="translate(52, 36)" stroke="#0284c7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 4,2 L 0,8 L 4,14" />
      <path d="M 12,2 L 16,8 L 12,14" />
      <path d="M 10,1 L 6,15" />
    </g>
    <text x="82" y="36" font-size="12.5" font-weight="600" fill="#0f172a">VS Code &amp; CLI</text>
    <text x="82" y="50" font-size="10" fill="#64748b">IDE chats and terminal logs</text>

    <!-- Card 2: Git Push -->
    <rect x="40" y="100" width="230" height="54" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- GitHub Icon -->
    <g transform="translate(52, 116) scale(0.75)" fill="#64748b">
      <path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/>
    </g>
    <text x="82" y="116" font-size="12.5" font-weight="600" fill="#0f172a">GitHub Integration</text>
    <text x="82" y="130" font-size="10" fill="#64748b">Commit diffs on push</text>

    <!-- Card 3: Messaging -->
    <rect x="40" y="180" width="230" height="54" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Chat Icon -->
    <g transform="translate(52, 196) scale(0.75)" stroke="#64748b" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </g>
    <text x="82" y="196" font-size="12.5" font-weight="600" fill="#0f172a">WhatsApp &amp; Telegram</text>
    <text x="82" y="210" font-size="10" fill="#64748b">Quick audio and text notes</text>
  </g>

  <!-- Middle Column: API Ingestion Hub -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="350" y="90" width="120" height="70" rx="8" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
    <!-- API connection icon -->
    <g transform="translate(398, 97) scale(0.75)" stroke="#0284c7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <circle cx="6" cy="6" r="3"/>
      <circle cx="18" cy="6" r="3"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="18" r="3"/>
      <line x1="8.5" y1="8.5" x2="10" y2="10"/>
      <line x1="15.5" y1="8.5" x2="14" y2="10"/>
      <line x1="8.5" y1="15.5" x2="10" y2="14"/>
      <line x1="15.5" y1="15.5" x2="14" y2="14"/>
    </g>
    <text x="410" y="132" font-size="13" font-weight="bold" fill="#0284c7" text-anchor="middle">Kote API</text>
    <text x="410" y="146" font-size="10" fill="#64748b" text-anchor="middle">Ingestion Hub</text>
  </g>

  <!-- Right Column: Database and User Interface -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Card 4: Cloud Database -->
    <rect x="580" y="50" width="180" height="55" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Database Stack Icon -->
    <g transform="translate(592, 65) scale(0.75)" stroke="#64748b" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="5" rx="9" ry="3"/>
      <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
      <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
    </g>
    <text x="622" y="71" font-size="12.5" font-weight="600" fill="#0f172a">Cloud Database</text>
    <text x="622" y="85" font-size="10" fill="#64748b">Semantic vector storage</text>

    <!-- Card 5: User Interface -->
    <rect x="580" y="150" width="180" height="55" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Browser/UI Icon -->
    <g transform="translate(592, 165) scale(0.75)" stroke="#64748b" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="18" rx="2" ry="2"/>
      <line x1="2" y1="9" x2="22" y2="9"/>
      <line x1="6" y1="6" x2="6.01" y2="6"/>
      <line x1="10" y1="6" x2="10.01" y2="6"/>
    </g>
    <text x="622" y="171" font-size="12.5" font-weight="600" fill="#0f172a">User Interface</text>
    <text x="622" y="185" font-size="10" fill="#64748b">Web search &amp; map view</text>
  </g>
</svg>
